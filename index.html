<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Голос Россонщины</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Подключение шрифта Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&subset=cyrillic,latin&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-subtle: #94a3b8;
            --border-color: #e2e8f0;
            --accent-color: #2563eb;
            --accent-soft: #eff6ff;
            --admin-gold: #d97706;
            --admin-bg: #fffbeb;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 14px;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: inherit;
        }

        /* Логотип строго картинка logo.jpg */
        .brand-logo-img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            display: block;
        }

        .brand-info h1 {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
            letter-spacing: -0.2px;
        }

        .brand-info p {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
        }

        .tg-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-soft);
            color: var(--accent-color);
            border: 1px solid #bfdbfe;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .tg-badge:active {
            opacity: 0.8;
        }

        .admin-banner {
            display: none;
            background: var(--admin-bg);
            border: 1px solid #fef08a;
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .admin-banner.visible {
            display: flex;
        }

        .admin-info-text {
            font-size: 13px;
            font-weight: 600;
            color: #92400e;
        }

        .btn-create-post {
            background: var(--admin-gold);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 22px;
            position: relative;
            cursor: pointer;
        }

        .post-card.active-card {
            border-color: var(--accent-color);
        }

        .carousel-container {
            position: relative;
            width: 100%;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
            background: #f1f5f9;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.35s ease;
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
        }

        .carousel-slide img {
            width: 100%;
            height: clamp(220px, 45vw, 380px);
            object-fit: cover;
            display: block;
        }

        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.85);
            padding: 4px 8px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: all 0.2s ease;
        }

        .carousel-dot.active {
            background: var(--accent-color);
            width: 14px;
            border-radius: 3px;
        }

        .carousel-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            font-size: 18px;
            color: var(--text-main);
        }

        .carousel-nav-btn.prev { left: 10px; }
        .carousel-nav-btn.next { right: 10px; }

        .post-time {
            font-size: 12px;
            color: var(--text-subtle);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .post-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 10px;
            color: var(--text-main);
            letter-spacing: -0.2px;
        }

        /* Разрешенная плавная анимация раскрытия поста */
        .post-text-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .post-card.expanded .post-text-wrapper {
            grid-template-rows: 1fr;
        }

        .post-text-inner {
            overflow: hidden;
        }

        .post-preview-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 15px;
            color: #334155;
            line-height: 1.55;
        }

        .post-card.expanded .post-preview-text {
            display: none;
        }

        .post-full-text {
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            padding-top: 2px;
        }

        .expand-hint {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            margin-top: 10px;
            cursor: pointer;
        }

        .post-card.expanded .expand-hint {
            display: none;
        }

        .active-reactions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .reaction-btn-pill {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 5px 12px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
        }

        .reaction-btn-pill.user-voted {
            background: var(--accent-soft);
            border-color: #93c5fd;
            color: var(--accent-color);
        }

        .apple-emoji {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            display: inline-block;
            object-fit: contain;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 10000;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            position: fixed;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: min(300px, calc(100vw - 32px));
            padding: 16px;
            box-shadow: 0 12px 30px -5px rgba(0, 0, 0, 0.12);
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92);
            transform-origin: top left;
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10001;
        }

        .modal-overlay.open .modal-container,
        .modal-container.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .modal-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-subtle);
            line-height: 1;
        }

        /* В контекстном меню ТОЛЬКО иконки смайлов без цифр */
        .reactions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .reaction-option {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 10px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reaction-option.selected {
            background: var(--accent-soft);
            border-color: #60a5fa;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .action-btn {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .action-btn.primary {
            background: var(--text-main);
            color: #ffffff;
            border-color: var(--text-main);
        }

        .admin-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(480px, calc(100vw - 32px));
            background: #ffffff;
            border-radius: var(--radius-lg);
            padding: 22px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            z-index: 10005;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            border: 1px solid var(--border-color);
        }

        .admin-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 90px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 20000;
        }

        .toast.show {
            opacity: 1;
        }

        footer {
            text-align: center;
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-subtle);
        }

        .empty-feed-notice {
            text-align: center;
            padding: 40px 20px;
            background: var(--card-bg);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <a href="#" class="brand">
                <!-- Картинка логотипа logo.jpg -->
                <img src="logo.jpg" alt="Голос Россонщины" class="brand-logo-img" onerror="this.onerror=null; this.src='https://placehold.co/80x80/2563eb/ffffff?text=ГР';">
                <div class="brand-info">
                    <h1>Голос Россонщины</h1>
                    <p>Информационный портал района</p>
                </div>
            </a>

            <div class="header-actions">
                <a href="https://t.me/rossony_online" target="_blank" class="tg-badge">
                    <span>Канал</span>
                </a>
            </div>
        </header>

        <!-- Только чистая центральная лента новостей (без правых панелей) -->
        <div class="main-content">
            <!-- Панель Администратора -->
            <div class="admin-banner" id="adminBanner">
                <div class="admin-info-text" id="adminBannerText">
                    Режим редактора (ID: 5116019950)
                </div>
                <button class="btn-create-post" onclick="openAdminModal()">
                    + Создать новость
                </button>
            </div>

            <!-- Основная лента новостей -->
            <main class="feed" id="newsFeed">
                <!-- Загружается из папки /news/ -->
            </main>
        </div>

        <footer>
            <p>Голос Россонщины © 2026</p>
        </footer>
    </div>

    <!-- Контекстное меню (вылезает из левого верхнего угла) -->
    <div class="modal-overlay" id="postModal" onclick="closeModal()">
        <div class="modal-container" id="modalContainer" onclick="event.stopPropagation()">
            <div class="modal-title">
                <span>Выберите реакцию</span>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>

            <!-- Реакции БЕЗ счётчиков -->
            <div class="reactions-grid" id="reactionsGrid">
            </div>

            <div class="modal-actions">
                <a href="https://t.me/rossony_online" target="_blank" class="action-btn primary" id="commentBtn">
                    Читать в Telegram
                </a>
                <button class="action-btn" onclick="copyPostLink()">
                    Копировать ссылку
                </button>
                <button class="action-btn" onclick="sharePost()">
                    Поделиться
                </button>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания новости для админа -->
    <div class="admin-modal" id="adminModal">
        <div class="modal-title">
            <span>Новая публикация</span>
            <button class="close-modal" onclick="closeAdminModal()">×</button>
        </div>
        <div class="form-group">
            <label>Заголовок новости</label>
            <input type="text" id="newPostTitle" class="form-control" placeholder="Введите заголовок...">
        </div>
        <div class="form-group">
            <label>Текст новости</label>
            <textarea id="newPostContent" class="form-control" placeholder="Введите полный текст новости..."></textarea>
        </div>
        <div class="form-group">
            <label>Ссылки на фото / logo.jpg (по одной в строке)</label>
            <textarea id="newPostMedia" class="form-control" placeholder="logo.jpg" style="min-height: 50px;"></textarea>
        </div>
        <div style="display:flex; flex-direction:column; gap:8px; margin-top:14px;">
            <button class="action-btn primary" onclick="publishPostFromModal()">Опубликовать на сайте</button>
            <button class="action-btn" onclick="downloadNewsJSON()">Скачать JSON файл (в /news)</button>
        </div>
    </div>

    <div class="toast" id="toastMessage">Сообщение</div>

    <script>
        const ADMIN_ID = 5116019950;
        let currentPostId = null;

        /* Таблица оригинальных Apple iOS смайликов */
        const appleEmojiMap = {
            '🔥': '1f525',
            '👍': '1f44d',
            '❤️': '2764-fe0f',
            '😂': '1f602',
            '😍': '1f60d',
            '😢': '1f622',
            '😡': '1f621',
            '👎': '1f44e',
            'ℹ️': '2139-fe0f',
            '✉️': '2709-fe0f'
        };

        function getAppleEmojiHtml(emojiChar, size = 20) {
            const code = appleEmojiMap[emojiChar];
            if (code) {
                const src = `https://cdn.jsdelivr.net/npm/emoji-datasource-apple@15.0.1/img/apple/64/${code}.png`;
                return `<img src="${src}" class="apple-emoji" style="width:${size}px; height:${size}px;" alt="${emojiChar}" loading="lazy">`;
            }
            return emojiChar;
        }

        // Чистые демо-новости со СТРОГО НУЛЕВЫМИ реакциями
        const fallbackPosts = [
            {
                id: 1,
                time: 'Сегодня, 15:40',
                title: 'В Россонах начинается весеннее обновление центрального парка',
                content: 'В Россонах завершилась подготовка к масштабному весеннему благоустройству парковой зоны. Местные жители и коммунальные службы активно поддержали инициативу субботника. Планируется высадить более трехсот деревьев, обновить скамейки, уложить новое тротуарное покрытие и оборудовать современную детскую площадку.',
                media: ['logo.jpg'],
                reactions: { '🔥': 0, '👍': 0, '❤️': 0, '😂': 0, '😍': 0, '😢': 0, '😡': 0, '👎': 0 },
                userChoice: null
            },
            {
                id: 2,
                time: 'Вчера, 18:10',
                title: 'Обновленное расписание районных автобусных маршрутов',
                content: 'Обновление расписания районного транспорта начнет действовать со следующей недели. Изменения коснутся утренних и вечерних рейсов для удобства жителей пригорода и школьников. Ознакомиться с подробным графиком по всем маршрутам можно на нашем портале.',
                media: ['logo.jpg'],
                reactions: { '🔥': 0, '👍': 0, '❤️': 0, '😂': 0, '😍': 0, '😢': 0, '😡': 0, '👎': 0 },
                userChoice: null
            }
        ];

        let postsData = [];

        async function loadNewsFeed() {
            let loadedPosts = [];

            // 1. Попытка загрузки из папки /news/ (manifest.json или отдельных постов)
            try {
                const manifestResp = await fetch('news/manifest.json');
                if (manifestResp.ok) {
                    const manifest = await manifestResp.json(); // Ожидаем массив имен файлов: ["post_1.json", "post_2.json"]
                    const fetchPromises = manifest.map(filename => 
                        fetch(`news/${filename}`)
                            .then(res => res.ok ? res.json() : null)
                            .catch(() => null)
                    );
                    const fetchedNews = await Promise.all(fetchPromises);
                    loadedPosts = fetchedNews.filter(post => post !== null);
                }
            } catch (e) {
                console.log("Локальный манифест /news/manifest.json не найден, загрузка из локального хранилища...");
            }

            // 2. Если в папке /news ничего нет или ошибка — загружаем из localStorage
            if (loadedPosts.length === 0) {
                try {
                    const local = localStorage.getItem('rossony_news_feed_v6');
                    if (local) {
                        loadedPosts = JSON.parse(local);
                    }
                } catch(e) {}
            }

            // 3. Если и там пусто — берем базовые чистые новости
            if (loadedPosts.length === 0) {
                postsData = fallbackPosts;
            } else {
                postsData = loadedPosts.sort((a, b) => b.id - a.id);
            }

            renderFeed();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();

                const user = tg.initDataUnsafe?.user;
                const urlParams = new URLSearchParams(window.location.search);
                if ((user && user.id === ADMIN_ID) || urlParams.get('admin') === 'true') {
                    document.getElementById('adminBanner').classList.add('visible');
                }
            }
            loadNewsFeed();
        });

        function savePosts() {
            localStorage.setItem('rossony_news_feed_v6', JSON.stringify(postsData));
        }

        function renderFeed() {
            const container = document.getElementById('newsFeed');
            container.innerHTML = '';

            if (postsData.length === 0) {
                container.innerHTML = `<div class="empty-feed-notice">Пока нет опубликованных новостей.</div>`;
                return;
            }

            postsData.forEach(post => {
                const article = document.createElement('article');
                article.className = 'post-card';
                article.id = `post-${post.id}`;

                // Карусель медиа
                let mediaHtml = '';
                const images = Array.isArray(post.media) ? post.media : (post.media ? [post.media] : []);
                
                if (images.length > 0) {
                    let slidesHtml = '';
                    let dotsHtml = '';

                    images.forEach((imgUrl, idx) => {
                        slidesHtml += `
                            <div class="carousel-slide">
                                <img src="${imgUrl}" alt="Фото новости" loading="lazy" onerror="this.onerror=null; this.src='logo.jpg';">
                            </div>`;
                        if (images.length > 1) {
                            dotsHtml += `<div class="carousel-dot ${idx === 0 ? 'active' : ''}" id="dot-${post.id}-${idx}"></div>`;
                        }
                    });

                    let navBtns = '';
                    if (images.length > 1) {
                        navBtns = `
                            <button class="carousel-nav-btn prev" onclick="event.stopPropagation(); moveCarousel(${post.id}, -1)">‹</button>
                            <button class="carousel-nav-btn next" onclick="event.stopPropagation(); moveCarousel(${post.id}, 1)">›</button>
                            <div class="carousel-dots">${dotsHtml}</div>
                        `;
                    }

                    mediaHtml = `
                        <div class="carousel-container">
                            <div class="carousel-track" id="track-${post.id}" data-index="0" data-total="${images.length}">
                                ${slidesHtml}
                            </div>
                            ${navBtns}
                        </div>
                    `;
                }

                article.innerHTML = `
                    ${mediaHtml}
                    <div class="post-time">${post.time}</div>
                    <div class="post-title">${post.title}</div>
                    <div class="post-preview-text">${post.content}</div>
                    <div class="post-text-wrapper">
                        <div class="post-text-inner">
                            <div class="post-full-text">${post.content}</div>
                        </div>
                    </div>
                    <span class="expand-hint" onclick="event.stopPropagation(); toggleExpandPost(${post.id})">Читать полностью...</span>
                    <div class="active-reactions" id="reactions-${post.id}">
                        ${getReactionsBarHtml(post)}
                    </div>
                `;

                attachTouchAndHoldEvents(article, post.id);
                container.appendChild(article);
            });
        }

        function getReactionsBarHtml(post) {
            let html = '';
            if (post.reactions) {
                for (const [emoji, count] of Object.entries(post.reactions)) {
                    // Показывать ТОЛЬКО если есть хотя бы 1 голос пользователей
                    if (count > 0) {
                        const votedClass = post.userChoice === emoji ? ' user-voted' : '';
                        html += `
                            <button class="reaction-btn-pill${votedClass}" onclick="event.stopPropagation(); toggleReaction(${post.id}, '${emoji}')">
                                ${getAppleEmojiHtml(emoji, 18)}
                                <span>${count}</span>
                            </button>
                        `;
                    }
                }
            }
            return html;
        }

        function updatePostReactionsUI(postId) {
            const post = postsData.find(p => p.id === postId);
            if (!post) return;

            const reactionsContainer = document.getElementById(`reactions-${postId}`);
            if (reactionsContainer) {
                reactionsContainer.innerHTML = getReactionsBarHtml(post);
            }
        }

        function toggleReaction(postId, emoji) {
            const post = postsData.find(p => p.id === postId);
            if (!post) return;

            if (!post.reactions) {
                post.reactions = { '🔥':0, '👍':0, '❤️':0, '😂':0, '😍':0, '😢':0, '😡':0, '👎':0 };
            }

            if (post.userChoice === emoji) {
                post.reactions[emoji] = Math.max(0, post.reactions[emoji] - 1);
                post.userChoice = null;
            } else {
                if (post.userChoice) {
                    post.reactions[post.userChoice] = Math.max(0, post.reactions[post.userChoice] - 1);
                }
                post.reactions[emoji] = (post.reactions[emoji] || 0) + 1;
                post.userChoice = emoji;
            }

            savePosts();
            updatePostReactionsUI(postId);

            if (currentPostId === postId) {
                buildModalReactionsGrid();
            }
        }

        function moveCarousel(postId, direction) {
            const track = document.getElementById(`track-${postId}`);
            if (!track) return;

            let currentIndex = parseInt(track.getAttribute('data-index') || '0');
            const total = parseInt(track.getAttribute('data-total') || '1');

            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= total) currentIndex = total - 1;

            track.setAttribute('data-index', currentIndex);
            track.style.transform = `translateX(-${currentIndex * 100}%)`;

            for (let i = 0; i < total; i++) {
                const dot = document.getElementById(`dot-${postId}-${i}`);
                if (dot) {
                    if (i === currentIndex) dot.classList.add('active');
                    else dot.classList.remove('active');
                }
            }
        }

        let holdTimer = null;
        let isHoldTriggered = false;

        function attachTouchAndHoldEvents(element, postId) {
            const startHold = (e) => {
                if (e.target.closest('.carousel-nav-btn') || e.target.closest('.reaction-btn-pill') || e.target.closest('.expand-hint')) return;

                isHoldTriggered = false;
                holdTimer = setTimeout(() => {
                    isHoldTriggered = true;
                    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                    }
                    openContextMenuForPost(e, postId);
                }, 1000); // Строго 1 секунда
            };

            const endHold = (e) => {
                if (holdTimer) {
                    clearTimeout(holdTimer);
                    holdTimer = null;

                    if (!isHoldTriggered && !e.target.closest('.carousel-nav-btn') && !e.target.closest('.reaction-btn-pill')) {
                        toggleExpandPost(postId);
                    }
                }
            };

            element.addEventListener('mousedown', startHold);
            element.addEventListener('mouseup', endHold);

            element.addEventListener('touchstart', startHold, { passive: true });
            element.addEventListener('touchend', endHold);
        }

        function toggleExpandPost(postId) {
            const card = document.getElementById(`post-${postId}`);
            if (card) {
                card.classList.toggle('expanded');
            }
        }

        function openContextMenuForPost(event, postId) {
            currentPostId = postId;

            const modalOverlay = document.getElementById('postModal');
            const modalContainer = document.getElementById('modalContainer');

            document.querySelectorAll('.post-card').forEach(c => c.classList.remove('active-card'));
            const card = document.getElementById(`post-${postId}`);
            if (card) card.classList.add('active-card');

            const touch = event.touches ? event.touches[0] : event;
            let posX = touch ? touch.clientX : window.innerWidth / 2;
            let posY = touch ? touch.clientY : window.innerHeight / 2;

            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            if (posX + 300 > windowWidth) posX = windowWidth - 310;
            if (posX < 10) posX = 10;
            if (posY + 260 > windowHeight) posY = windowHeight - 270;
            if (posY < 10) posY = 10;

            modalContainer.style.top = `${posY}px`;
            modalContainer.style.left = `${posX}px`;

            buildModalReactionsGrid();
            modalOverlay.classList.add('open');
            modalContainer.classList.add('open');
        }

        /* Генерация списка реакций В КОНТЕКСТНОМ МЕНЮ СТРОГО БЕЗ СЧЁТЧИКОВ */
        function buildModalReactionsGrid() {
            const grid = document.getElementById('reactionsGrid');
            grid.innerHTML = '';

            const emojis = ['🔥', '👍', '❤️', '😂', '😍', '😢', '😡', '👎'];
            const post = postsData.find(p => p.id === currentPostId);

            emojis.forEach(emoji => {
                const isSelected = post && post.userChoice === emoji;
                
                const btn = document.createElement('button');
                btn.className = `reaction-option${isSelected ? ' selected' : ''}`;
                btn.onclick = () => selectReaction(emoji);
                btn.innerHTML = getAppleEmojiHtml(emoji, 26);
                grid.appendChild(btn);
            });
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('open');
            document.getElementById('modalContainer').classList.remove('open');
            document.querySelectorAll('.post-card').forEach(c => c.classList.remove('active-card'));
            currentPostId = null;
        }

        function selectReaction(emoji) {
            if (!currentPostId) return;
            toggleReaction(currentPostId, emoji);
            buildModalReactionsGrid();
        }

        function openAdminModal() {
            document.getElementById('adminModal').classList.add('open');
            closeModal();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('open');
        }

        function publishPostFromModal() {
            const title = document.getElementById('newPostTitle').value.trim();
            const content = document.getElementById('newPostContent').value.trim();
            const mediaRaw = document.getElementById('newPostMedia').value.trim();

            if (!title || !content) {
                showToast('Заполните заголовок и текст!');
                return;
            }

            const mediaArray = mediaRaw ? mediaRaw.split('\n').map(s => s.trim()).filter(Boolean) : ['logo.jpg'];

            const newPost = {
                id: Date.now(),
                time: 'Только что',
                title: title,
                content: content,
                media: mediaArray,
                reactions: { '🔥': 0, '👍': 0, '❤️': 0, '😂': 0, '😍': 0, '😢': 0, '😡': 0, '👎': 0 },
                userChoice: null
            };

            postsData.unshift(newPost);
            savePosts();
            renderFeed();
            closeAdminModal();

            showToast('Новость опубликована!');
        }

        function downloadNewsJSON() {
            const title = document.getElementById('newPostTitle').value.trim();
            const content = document.getElementById('newPostContent').value.trim();
            const mediaRaw = document.getElementById('newPostMedia').value.trim();

            if (!title || !content) {
                showToast('Заполните данные новости!');
                return;
            }

            const mediaArray = mediaRaw ? mediaRaw.split('\n').map(s => s.trim()).filter(Boolean) : ['logo.jpg'];
            const timestamp = Date.now();

            const singleNewsObj = {
                id: timestamp,
                time: new Date().toLocaleString('ru-RU', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' }),
                title: title,
                content: content,
                media: mediaArray,
                reactions: { '🔥': 0, '👍': 0, '❤️': 0, '😂': 0, '😍': 0, '😢': 0, '😡': 0, '👎': 0 },
                userChoice: null
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(singleNewsObj, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `post_${timestamp}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();

            showToast(`JSON сохранен! Поместите его в /news/`);
        }

        function showToast(text) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function copyPostLink() {
            const dummyUrl = window.location.href.split('#')[0] + '#post-' + currentPostId;
            const textarea = document.createElement('textarea');
            textarea.value = dummyUrl;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('Ссылка скопирована!');
            } catch (err) {
                showToast('Ошибка при копировании');
            }
            document.body.removeChild(textarea);
            closeModal();
        }

        function sharePost() {
            const dummyUrl = window.location.href.split('#')[0] + '#post-' + currentPostId;
            if (navigator.share) {
                navigator.share({
                    title: 'Голос Россонщины',
                    text: 'Читать новость в газете «Голос Россонщины»',
                    url: dummyUrl
                }).catch(() => {});
            } else {
                copyPostLink();
            }
            closeModal();
        }
    </script>
</body>
